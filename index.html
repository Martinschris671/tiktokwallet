<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | App</title>
<link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="tiktokicon.png">
  <link rel="apple-touch-icon" href="tiktokicon.png">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      /* --- CSS Variables --- */
      :root {
        --bg-color: #f8f8f8;
        --card-bg: #ffffff;
        --text-primary: #161823;
        --text-secondary: #8a8b91;
        --text-tertiary: #b0b0b4;
        --primary-red: #fe2c55;
        --btn-secondary-bg: #f1f1f2;
        --divider-color: #f2f2f2;
        --tab-bg: #f1f1f2;
        --input-bg: #f8f8f8;
        --success-green: #00c36b;
        --error-red: #ff4c3a;
      }

      /* --- Custom Fonts --- */
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-SemiBold.ttf") format("truetype");
        font-weight: 600;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      /* --- Base Setup --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          "TikTokSans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* --- Card UI --- */
      .auth-container {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 400px;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--divider-color);
        position: relative;
      }

      h2.title {
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 30px;
        color: var(--text-primary);
      }

      /* --- Inputs --- */
      .input-group {
        margin-bottom: 15px;
        position: relative;
      }

      .input-group input {
        width: 100%;
        background-color: var(--input-bg);
        border: 1px solid transparent;
        padding: 14px 16px;
        border-radius: 8px;
        font-size: 15px;
        color: var(--text-primary);
        outline: none;
        transition: all 0.2s ease;
      }

      .input-group input::placeholder {
        color: var(--text-tertiary);
        font-weight: 400;
      }

      .input-group input:focus {
        border: 1px solid var(--text-tertiary);
        background-color: var(--card-bg);
      }

      /* --- Button --- */
      .btn-primary {
        width: 100%;
        background-color: var(--primary-red);
        color: #ffffff;
        border: none;
        padding: 16px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: opacity 0.2s ease;
      }

      .btn-primary:disabled {
        background-color: var(--text-tertiary);
        cursor: not-allowed;
        opacity: 0.6;
      }

      .btn-primary:not(:disabled):hover {
        opacity: 0.9;
      }

      /* --- Status Message --- */
      #status-msg {
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        margin-top: 15px;
        min-height: 20px;
      }

      /* --- Divider --- */
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 30px 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid var(--divider-color);
      }

      .divider span {
        padding: 0 15px;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
      }

      /* --- Footer (Toggle) --- */
      .footer {
        text-align: center;
        font-size: 15px;
        color: var(--text-primary);
      }

      .footer a {
        color: var(--primary-red);
        text-decoration: none;
        font-weight: 600;
        margin-left: 5px;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h2 class="title" id="form-title">Log in</h2>

      <div class="input-group">
        <input
          type="email"
          id="email"
          placeholder="Email address"
          required
          autocomplete="email"
        />
      </div>

      <div class="input-group">
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
          autocomplete="current-password"
        />
      </div>

      <button id="submit-btn" class="btn-primary" disabled>Log in</button>

      <div id="status-msg"></div>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="footer">
        <span id="toggle-text">Don't have an account?</span>
        <a href="#" id="toggle-link">Sign up</a>
      </div>
    </div>

    <script>
      // --- SUPABASE SETUP ---
      const SUPABASE_URL = "https://odhxccqsrvkfwvpjjmof.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kaHhjY3FzcnZrZnd2cGpqbW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk5NzAsImV4cCI6MjA4NzkyNTk3MH0.rjyZ-GLvt2o-nwOWeUFWkdbzUG4ZXZOilYw8PHKovs8";
      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      /* --- Guard: Check if already logged in --- */
      (async function checkSession() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();
        if (session) {
          window.location.replace("key.html"); // Send to key page immediately
        }
      })();

      // --- UI Elements ---
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const submitBtn = document.getElementById("submit-btn");
      const statusMsg = document.getElementById("status-msg");
      const formTitle = document.getElementById("form-title");
      const toggleText = document.getElementById("toggle-text");
      const toggleLink = document.getElementById("toggle-link");

      let isLoginMode = true; // State tracker

      // --- Enable/Disable Button based on input ---
      function checkInputs() {
        if (
          emailInput.value.trim() !== "" &&
          passwordInput.value.trim() !== ""
        ) {
          submitBtn.removeAttribute("disabled");
        } else {
          submitBtn.setAttribute("disabled", "true");
        }
      }

      emailInput.addEventListener("input", checkInputs);
      passwordInput.addEventListener("input", checkInputs);

      // --- Toggle Login / Sign Up Mode ---
      toggleLink.addEventListener("click", (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        statusMsg.innerText = ""; // clear messages

        if (isLoginMode) {
          formTitle.innerText = "Log in";
          submitBtn.innerText = "Log in";
          toggleText.innerText = "Don't have an account?";
          toggleLink.innerText = "Sign up";
        } else {
          formTitle.innerText = "Sign up";
          submitBtn.innerText = "Sign up";
          toggleText.innerText = "Already have an account?";
          toggleLink.innerText = "Log in";
        }
      });

      // --- Auth Logic (Sign in & Sign up) ---
      submitBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) return;

        // UI Loading state
        submitBtn.setAttribute("disabled", "true");
        submitBtn.innerText = "Processing...";
        statusMsg.style.color = "var(--text-secondary)";
        statusMsg.innerText = "Please wait...";

        try {
          let result;
          if (isLoginMode) {
            // LOGIN
            result = await supabaseClient.auth.signInWithPassword({
              email,
              password,
            });
          } else {
            // SIGN UP
            result = await supabaseClient.auth.signUp({ email, password });
          }

          if (result.error) throw result.error;

          // SUCCESS
          statusMsg.style.color = "var(--success-green)";

          if (!isLoginMode && result.data?.user?.identities?.length === 0) {
            // Edge case: User already exists during sign up
            throw new Error("User already exists. Please log in.");
          }

          if (!isLoginMode) {
            statusMsg.innerText = "Account created! Redirecting...";
          } else {
            statusMsg.innerText = "Login successful! Redirecting...";
          }

          // Wait 1 second then redirect to key verification
          setTimeout(() => {
            window.location.replace("key.html");
          }, 1000);
        } catch (error) {
          // ERROR
          console.error("Auth Error:", error);
          statusMsg.style.color = "var(--error-red)";
          statusMsg.innerText = error.message;

          // Reset UI
          submitBtn.removeAttribute("disabled");
          submitBtn.innerText = isLoginMode ? "Log in" : "Sign up";
        }
      });
    </script>
  </body>
</html>
