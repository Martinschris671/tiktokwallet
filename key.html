<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activate License | App</title>

    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      /* --- CSS Variables --- */
      :root {
        --bg-color: #f8f8f8;
        --card-bg: #ffffff;
        --text-primary: #161823;
        --text-secondary: #8a8b91;
        --text-tertiary: #b0b0b4;
        --primary-red: #fe2c55;
        --btn-secondary-bg: #f1f1f2;
        --divider-color: #f2f2f2;
        --tab-bg: #f1f1f2;
        --input-bg: #f8f8f8;
        --success-green: #00c36b;
        --error-red: #ff4c3a;
      }

      /* --- Custom Fonts --- */
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-SemiBold.ttf") format("truetype");
        font-weight: 600;
        font-style: normal;
      }
      @font-face {
        font-family: "TikTokSans";
        src: url("fonts/TikTokSans-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      /* --- Base Setup --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          "TikTokSans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* --- Card UI --- */
      .auth-container {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 400px;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--divider-color);
        position: relative;
      }

      h2.title {
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      p.subtitle {
        text-align: center;
        font-size: 15px;
        color: var(--text-secondary);
        margin-bottom: 30px;
        font-weight: 400;
        line-height: 1.4;
      }

      /* --- Inputs --- */
      .input-group {
        margin-bottom: 15px;
        position: relative;
      }

      .input-group input {
        width: 100%;
        background-color: var(--input-bg);
        border: 1px solid transparent;
        padding: 14px 16px;
        border-radius: 8px;
        font-size: 15px;
        color: var(--text-primary);
        outline: none;
        transition: all 0.2s ease;
        text-transform: uppercase; /* Forces key to be uppercase visually */
        letter-spacing: 1px;
        font-weight: 500;
      }

      .input-group input::placeholder {
        color: var(--text-tertiary);
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
      }

      .input-group input:focus {
        border: 1px solid var(--text-tertiary);
        background-color: var(--card-bg);
      }

      /* --- Button --- */
      .btn-primary {
        width: 100%;
        background-color: var(--primary-red);
        color: #ffffff;
        border: none;
        padding: 16px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: opacity 0.2s ease;
      }

      .btn-primary:disabled {
        background-color: var(--text-tertiary);
        cursor: not-allowed;
        opacity: 0.6;
      }

      .btn-primary:not(:disabled):hover {
        opacity: 0.9;
      }

      /* --- Status Message --- */
      #status-msg {
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        margin-top: 15px;
        min-height: 20px;
      }

      /* --- Divider --- */
      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 30px 0;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid var(--divider-color);
      }

      .divider span {
        padding: 0 15px;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
      }

      /* --- Footer (Logout) --- */
      .footer {
        text-align: center;
        font-size: 15px;
        color: var(--text-primary);
      }

      .footer a {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }

      .footer a:hover {
        color: var(--primary-red);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <h2 class="title">Access Key</h2>
      <p class="subtitle">
        Enter your valid license key to unlock the dashboard.
      </p>

      <div class="input-group">
        <input
          type="text"
          id="key-input"
          placeholder="XXXX-XXXX-XXXX"
          autocomplete="off"
        />
      </div>

      <button id="activate-btn" class="btn-primary" disabled>Continue</button>

      <div id="status-msg"></div>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="footer">
        <a href="#" id="logout-btn">Log out of account</a>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://odhxccqsrvkfwvpjjmof.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kaHhjY3FzcnZrZnd2cGpqbW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDk5NzAsImV4cCI6MjA4NzkyNTk3MH0.rjyZ-GLvt2o-nwOWeUFWkdbzUG4ZXZOilYw8PHKovs8";
      const supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      /* --- 1. Guard (Run Immediately) --- */
      (async function guard() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        // If not logged in, kick to index.html
        if (!session) {
          window.location.replace("index.html");
          return;
        }

        // Check if user already has an ACTIVE key
        const { data: activeKey } = await supabaseClient
          .from("keys")
          .select("id")
          .gt("expiration_timestamp", new Date().toISOString())
          .limit(1);

        // If key is valid, skip this page and go straight home!
        if (activeKey && activeKey.length > 0) {
          window.location.replace("home.html");
        }
      })();

      /* --- 2. UI Interaction Logic --- */
      const keyInput = document.getElementById("key-input");
      const activateBtn = document.getElementById("activate-btn");
      const statusMsg = document.getElementById("status-msg");

      // Enable/disable button based on typing
      keyInput.addEventListener("input", function () {
        if (this.value.trim().length > 0) {
          activateBtn.removeAttribute("disabled");
        } else {
          activateBtn.setAttribute("disabled", "true");
        }
      });

      /* --- 3. RPC Activation Logic (ULTRA SECURE) --- */
      activateBtn.addEventListener("click", async () => {
        const key = keyInput.value.trim().toUpperCase(); // Force uppercase for backend
        if (!key) return;

        // UI Loading State
        statusMsg.style.color = "var(--text-secondary)";
        statusMsg.innerText = "Verifying secure key...";
        activateBtn.innerText = "Processing...";
        activateBtn.setAttribute("disabled", "true");

        try {
          // Secure server-side call
          const { data, error } = await supabaseClient.rpc("redeem_key", {
            input_key: key,
          });

          if (error) throw new Error("System error. Please try again.");
          if (!data || data.success === false)
            throw new Error(data.message || "Invalid serial key.");

          // SUCCESS
          statusMsg.style.color = "var(--success-green)";
          statusMsg.innerText = "Success! Unlocking dashboard...";

          setTimeout(() => {
            window.location.replace("home.html");
          }, 1500);
        } catch (err) {
          // FAILURE
          statusMsg.style.color = "var(--error-red)";
          statusMsg.innerText = err.message;

          // Reset button
          activateBtn.innerText = "Continue";
          activateBtn.removeAttribute("disabled");
        }
      });

      /* --- 4. Logout feature --- */
      document
        .getElementById("logout-btn")
        .addEventListener("click", async (e) => {
          e.preventDefault();
          await supabaseClient.auth.signOut();
          window.location.replace("index.html");
        });
    </script>
  </body>
</html>
